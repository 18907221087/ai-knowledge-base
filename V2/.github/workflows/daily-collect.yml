name: Daily AI Knowledge Collection

# 每天 UTC 08:00（北京时间 16:00）自动采集
on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write

jobs:
  collect:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: V2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collection pipeline
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python pipeline/pipeline.py `
            --sources github,rss `
            --limit 20 `
            --verbose

      - name: Validate collected articles
        run: |
          $files = Get-ChildItem -Path knowledge/articles/*.json -ErrorAction SilentlyContinue
          if ($files) {
            python hooks/validate_json.py $files
            python hooks/check_quality.py $files
          } else {
            Write-Host "No articles to validate"
          }

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add knowledge/
          $staged = git diff --staged --name-only
          if ([string]::IsNullOrWhiteSpace($staged)) {
            Write-Host "No new articles to commit"
          } else {
            $ARTICLE_COUNT = ($staged | Select-String '\.json$').Count
            $dateStr = (Get-Date).ToUniversalTime().ToString("yyyy-MM-dd")
            git commit -m "chore: daily collection - $ARTICLE_COUNT articles [$dateStr]"
            git push
          }
